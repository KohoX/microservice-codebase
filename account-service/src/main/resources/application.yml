spring:
  application:
    name: "account-service"
#  profiles:
#    active: "prod"
  config:
    import: "optional:configserver:http://localhost:8071/"

  #    Mysql Datasource
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:3306/kohobank
#    url: jdbc:mysql://mysql:3306/kohobank
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

    #    Hikari Default Configuration
    hikari:
      connection-timeout: 30000
      idle-timeout: 60000
      leak-detection-threshold: 0
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 10
      pool-name: HikariPool-1
      validation-timeout: 5000

#    JPA/Hibernate configuration
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        show_sql: true
        use_sql_comments: true
#  rabbitmq:
#    host: "localhost"
#    port: 5672
#    username: "guest"
#    password: "guest"
management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    shutdown:
      access: unrestricted
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/

info:
  app:
    name: "account-service"
    description: "KOHO Bank Account-Service Application"
    version: "v1.0"

logging:
  level:
    com:
      kohobank:
        accountservice: DEBUG
